<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry Poorva</title>
<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#333;
}

.container{
    background:white;
    padding:40px;
    border-radius:20px;
    width:80%;
    max-width:500px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    color:#ff4d6d;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#ff2e55;
}

.hidden{
    display:none;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
<h1>I'm Sorry, Poorva</h1>

<p>
I know I made mistakes and I truly regret them.  
You mean a lot to me and hurting you was never my intention.
</p>

<button onclick="showMessage()">Click if you can hear me out</button>

<div id="message" class="hidden">
<p>
I just want you to know that I genuinely care about you.  
If I could go back and change things, I would.  
I'm really sorry. ❤️
</p>
</div>

</div>

<script>
function showMessage(){
document.getElementById("message").style.display="block";
}
</script>

</body>
</html>
