<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Prerana ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  text-align: center;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  max-width: 600px;
  padding: 20px;
}

h1 {
  font-size: 2.5rem;
}

p {
  font-size: 1.2rem;
  margin-top: 20px;
  white-space: pre-line;
}

button {
  margin-top: 30px;
  padding: 12px 25px;
  font-size: 1.2rem;
  border: none;
  border-radius: 25px;
  background: white;
  color: #ff6f91;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ffe6eb;
}
</style>
</head>

<body>

<div class="container">
  <h1>Hey Prerana ❤️</h1>
  
  <p id="text"></p>

  <button onclick="showMessage()">Click here</button>
</div>

<script>
let message = "I don’t know how to say this perfectly... but I’ll try.\n\nSomewhere between our conversations, laughs, and moments… you became really special to me.\n\nAnd now I can’t imagine not having you in my life.\n\nSo yeah… I really like you, Prerana.\n\nWill you be mine? ❤️";

let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}

function showMessage() {
  document.getElementById("text").innerHTML = "";
  i = 0;
  typeWriter();
}
</script>

</body>
</html>
